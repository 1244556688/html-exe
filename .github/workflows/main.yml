name: Build Electron App

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 下載原始碼
        uses: actions/checkout@v4

      - name: 安裝 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安裝套件
        run: npm install

      - name: 打包 EXE
        run: npm run dist

      - name: 上傳成品
        uses: actions/upload-artifact@v4
        with:
          name: Windows-EXE
          path: dist/*
