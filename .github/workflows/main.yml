name: Electron CI / Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      # 🟢 Build EXE (不 publish)
      - name: Build (CI)
        if: github.ref_type != 'tag'
        run: npm run dist

      # 📦 Upload artifact (CI preview)
      - name: Upload EXE artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: MyApp-EXE
          path: dist/*.exe

      # 🚀 Release (tag only)
      - name: Build & Publish Release
        if: github.ref_type == 'tag'
        run: npm run dist
        env:
          GH_TOKEN: ${{ github.token }}
